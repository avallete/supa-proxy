# Local dev: two separate containers (Postgres + pg-gateway sidecar).
# Use this for rapid iteration on pg-gateway without rebuilding the PG image.
#
# Usage:
#   docker compose up --build
#   curl http://localhost:15432/health
#   curl -s -X POST http://localhost:15432/sql \
#     -H "Authorization: Bearer $(./scripts/mint-dev-token.sh)" \
#     -H "Content-Type: application/json" \
#     -d '{"query":"SELECT version()"}' | jq .
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 2s
      retries: 10

  pg-gateway:
    build:
      context: ..
      dockerfile: pg-gateway/Dockerfile
    ports:
      - "15432:15432"
      - "2112:2112"
    environment:
      LISTEN_PORT: ":15432"
      METRICS_PORT: ":2112"
      JWT_SECRET: "dev-secret-change-me"
      PG_HOST: "db"
      PG_PORT: "5432"
      PG_USER: "postgres"
      PG_PASSWORD: "postgres"
      PG_DATABASE: "postgres"
      ALLOW_ADDR_REGEX: ".*"
      STATEMENT_TIMEOUT: "30s"
      MAX_FIELD_BYTES: "1048576"
      CURSOR_BATCH_SIZE: "100"
      LOG_QUERIES: "true"
    depends_on:
      db:
        condition: service_healthy
